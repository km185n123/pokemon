name: Flutter CI with FVM

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: kuhnroyal/flutter-fvm-config-action/setup@v3
        with:
          cache: true   # habilita cache de Flutter

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
