name: Flutter CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests (Flutter via FVM)
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Configurar Flutter usando FVM
      - name: Setup Flutter from FVM
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvm/fvm_config.json
          cache: true

      # 3. Instalar dependencias
      - name: Install dependencies
        run: flutter pub get

      # 4. Analizar código
      - name: Analyze project
        run: flutter analyze

      # 5. Correr tests unitarios
      - name: Run unit tests
        run: flutter test
